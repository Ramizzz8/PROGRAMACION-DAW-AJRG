<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>PhotoStudio Lite</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: #0f0f0f;
    color: #fff;
    display: flex;
    height: 100vh;
  }

  .sidebar {
    width: 260px;
    background: #161616;
    padding: 16px;
    border-right: 1px solid #2a2a2a;
  }

  .sidebar h2 {
    margin-top: 0;
    font-size: 18px;
  }

  .tool {
    margin-bottom: 16px;
  }

  input, button {
    width: 100%;
  }

  button {
    background: #272727;
    border: none;
    color: white;
    padding: 10px;
    margin-top: 6px;
    cursor: pointer;
    border-radius: 6px;
  }

  button:hover {
    background: #3a3a3a;
  }

  .main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle, #222, #000);
  }

  canvas {
    background: white;
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
    cursor: crosshair;
  }
</style>
</head>
<body>

<div class="sidebar">
  <h2>PhotoStudio Lite</h2>

  <div class="tool">
    Color
    <input type="color" id="color" value="#000000">
  </div>

  <div class="tool">
    Tamaño
    <input type="range" id="size" min="1" max="60" value="6">
  </div>

  <div class="tool">
    <button id="draw">✏️ Dibujar</button>
    <button id="erase">🩹 Borrar</button>
  </div>

  <div class="tool">
    <button id="clear">🗑 Limpiar</button>
    <button id="save">💾 Guardar</button>
  </div>
</div>

<div class="main">
  <canvas id="canvas" width="900" height="550"></canvas>
</div>

<script>
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  let drawing = false;
  let mode = "draw";

  ctx.lineCap = "round";

  canvas.addEventListener("mousedown", e => {
    drawing = true;
    ctx.beginPath();
    ctx.moveTo(e.offsetX, e.offsetY);
  });

  canvas.addEventListener("mousemove", e => {
    if (!drawing) return;
    ctx.lineTo(e.offsetX, e.offsetY);
    ctx.stroke();
  });

  window.addEventListener("mouseup", () => drawing = false);

  document.getElementById("color").oninput = e => {
    ctx.strokeStyle = e.target.value;
  };

  document.getElementById("size").oninput = e => {
    ctx.lineWidth = e.target.value;
  };

  document.getElementById("draw").onclick = () => {
    mode = "draw";
    ctx.globalCompositeOperation = "source-over";
  };

  document.getElementById("erase").onclick = () => {
    mode = "erase";
    ctx.globalCompositeOperation = "destination-out";
  };

  document.getElementById("clear").onclick = () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  };

  document.getElementById("save").onclick = () => {
    const a = document.createElement("a");
    a.download = "photostudio.png";
    a.href = canvas.toDataURL("image/png");
    a.click();
  };
</script>

</body>
</html>
