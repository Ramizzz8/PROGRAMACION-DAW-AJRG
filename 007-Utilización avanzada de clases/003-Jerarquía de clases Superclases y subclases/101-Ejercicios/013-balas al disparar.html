<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Document</title>
    <style>
      #nave {
        position: absolute;
        top: 0;
        left: 0;
        width: 100px;
      }
      .bala {
        position: absolute;
        width: 30px;
      }
      body {
        background: url('espacio.jpg') no-repeat center center fixed;
        background-size: cover;
      }
    </style>
  </head>
  <body>
    <img src="naveespacial.png" id="nave" />
    <script>
      //Variables globales
      let anchopagina = window.innerWidth;
      let altopagina = window.innerHeight;

      class Entidad {
        constructor(x, y, a, v) {
          this.posx = x;
          this.posy = y;
          this.angulo = a;
          this.velocidad = v;
        }
      }
      class Jugador extends Entidad {
        constructor(x, y, a, v) {
          super(x, y, a, v);
        }
      }
      class Roca extends Entidad {
        constructor(x, y, a, e, v) {
          super(x, y, a, v);
          this.escala = e;
        }
      }
      class Bala extends Entidad {
        constructor(x, y, a, v) {
          super(x, y, a, v);
        }
      }
      //Crear rocas aleatorias
      let numero_rocas = 15; // Digo cuantas rocas quiero
      let rocas = []; // Creo un array vacío
      for (let i = 0; i < numero_rocas; i++) {
        // Recorro un bucle
        let posx_aleatoria = Math.random() * anchopagina; // posx aleatoria en toda la anchura de la página
        let posy_aleatoria = Math.random() * altopagina; // posy aleatoria en toda la altura de la página
        let angulo_aleatorio = Math.random() * 360; // ángulo aleatorio entre 0 y 360
        let escala_aleatoria = Math.random() * 1.5 + 0.5; // escala aleatoria entre 0.5 y 2
        rocas.push(new Roca(posx_aleatoria, posy_aleatoria, angulo_aleatorio, escala_aleatoria, 0)); // Creo una nueva roca
      }
      //voy a crear balas al presionar la barra espaciadora
      let numero_balas = 0; //contador de balas
      let balas = []; //array de balas
      //Crear instancia del jugador
      let nave = document.querySelector('#nave');
      let InstanciaJugador = new Jugador(
        Math.random() * anchopagina,
        Math.random() * altopagina,
        0,
        0
      );

      nave.style.left = InstanciaJugador.posx + 'px';
      nave.style.top = InstanciaJugador.posy + 'px';

      document.onkeydown = function (tecla) {
        // Cuando sobre el documento pulse tec
        // w = 87, s = 83, a = 65 , d= 68
        switch (tecla.keyCode) {
          case 87: // Si pulso W
            InstanciaJugador.posy -= 5; // Subo cinco unidades en Y
            break;
          case 83: // Si pulso S
            InstanciaJugador.posy += 5; // Bajo cinco unidades en Y
            break;
          case 65: // Si pulso A
            InstanciaJugador.posx -= 5; // Quito cinco unidades en X
            break;
          case 68: // Si pulso D
            InstanciaJugador.posx += 5; // Sumo cinco unidades en X
            break;
          case 32: // Si pulso la barra espaciadora
            balas.push(new Bala(InstanciaJugador.posx, InstanciaJugador.posy, 0, 0)); // Cada vez que puso la barra espaciadora, creo una bala nueva
            let nueva_bala = document.createElement('img'); // Creo una nueva imagen
            nueva_bala.classList.add('bala'); // Le añado la clase roca
            nueva_bala.src = 'bala.png'; // Cargo la imagen de la roca
            nueva_bala.style.position = 'absolute'; // Le pongo absoluto para poder mover con libertad
            nueva_bala.style.left = InstanciaJugador.posx + 'px'; // Le pongo su posicion X
            nueva_bala.style.top = InstanciaJugador.posy + 'px'; // Le pongo su posicion Y
            document.querySelector('body').appendChild(nueva_bala); // Añado la roca al body
            break;
        }
        nave.style.left = InstanciaJugador.posx + 'px';
        nave.style.top = InstanciaJugador.posy + 'px';
      };
      //Dibujar rocas
      for (let i = 0; i < rocas.length; i++) {
        let nueva_roca = document.createElement('img'); // Creo un elemento img
        nueva_roca.src = 'roca.png'; // Le asigno la imagen
        nueva_roca.style.position = 'absolute'; // Pongo su posición a absolute
        nueva_roca.style.left = rocas[i].posx + 'px'; // Le asigno la posx
        nueva_roca.style.top = rocas[i].posy + 'px'; // Le asigno la posy
        nueva_roca.style.width = '50px'; // Le asigno un tamaño
        nueva_roca.style.transform =
          'rotate(' + rocas[i].angulo + 'deg) scale(' + rocas[i].escala + ')'; // Le asigno rotación y escala
        document.querySelector('body').appendChild(nueva_roca); // La añado al body
      }
    </script>
  </body>
</html>
